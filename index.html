<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>SITTA Bahan Ajar UT</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  </head>

  <body>
    <div id="app">
      <h1>Sistem Bahan Ajar UT</h1>

      <nav>
        <button
          class="tab-btn"
          :class="{'tab-active':tab=='stok'}"
          @click="tab='stok'"
        >
          📚 Stok Bahan Ajar
        </button>

        <button
          class="tab-btn"
          :class="{'tab-active':tab=='tracking'}"
          @click="tab='tracking'"
        >
          🚚 Tracking DO
        </button>
      </nav>

      <section v-show="tab=='stok'">
        <ba-stock-table
          :items="stok"
          :upbjj-list="upbjjList"
          :kategori-list="kategoriList"
        >
        </ba-stock-table>
      </section>

      <section v-show="tab=='tracking'">
        <do-tracking :data="tracking" :paket="paket"> </do-tracking>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <script src="js/components/status-badge.js"></script>
    <script src="js/components/app-modal.js"></script>
    <script src="js/components/stock-table.js"></script>
    <script src="js/components/do-tracking.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
